# Foundation bundle v0.5.0 manifest
#
# Minor-additive release over v0.4.0 (2026-06-16). See migration-manifest.yaml for the
# v0.4.x → v0.5.0 entry. No managed-file boundary change; no section removed/renamed; no
# new placeholder KEY introduced.
#
# Schema changes from v0.4.0 (minor-additive):
#   - vision.vision_recap section ADDED (id: vision_recap; title: "Vision Recap";
#     applies_to: [all]; render_modes: [complete]; source: template; population_status:
#     populated). Reuses the existing VISION_PURPOSE input (no new placeholder KEY), so it
#     renders for any operator project that already answered the vision interview.
#   - section_schema_version bumped v0.3 → v0.4 (template foundation_schema_version
#     frontmatter bumped to match on all six templates per the per-bundle invariant).
#   - all other doc-type section schemas UNCHANGED.
#
# Per-version foundation-bundle package (status: prerelease).
# Authority: the canonical foundation-versioning specification § 8.1 schema + § 7 directory layout.
# Pre-v1 stabilization clause applies per § 1.3 (layout-vs-stability decoupling: this is a
# pre-v1 per-version package and does NOT forfeit the stabilization clause — that forfeit
# happens at v1.0.0 promotion).
#
# Honesty notes for this manifest's content:
#   - field name `foundation_bundle_version:` (NOT `version:`)
#   - `included_templates.foundation_docs` lists actual `.md` filenames (NOT `.md.template`)
#   - `prd.md` is NOT in included_templates (prd is source: schema_only per
#     schemas/section-schema.yaml; no template is shipped; operator authors prd.md content
#     from schema)
#   - `generator_version:` field OMITTED at v0.3.0 — generator-version identity is NOT
#     yet wired in this prerelease. v0.3.0 is a static-asset prerelease package; the
#     generator pipeline is forthcoming in subsequent releases. The first v1.0.0-stable
#     release will populate generator_version with a meaningful value.
#   - `agent_contract_version:` carries pre-rebuild placeholder — agent-prompt and build
#     scaffolding rebuild is a parallel forthcoming track (not in this release scope).
#     First bundle that ships rebuilt agent contracts will populate this with a meaningful
#     value.

foundation_bundle_version: v0.5.0
foundation_schema_version: v0.4
agent_contract_version: v0-pre-rebuild  # see honesty note above
release_date: 2026-06-16
source_commit: d36614d  # filled at Phase-4 commit per atomic-change-set discipline
status: prerelease  # see wizard/registry/foundation-bundles.json entry for v0.5.0

included_templates:
  foundation_docs:
    - vision.md
    - approach.md
    - technical_architecture.md
    - execution_plan.md
    - test_cases.md
    - audit_framework.md
  # markdown_agents: NOT included at v0.3.0 (agent-prompt/build rebuild is a parallel
  # forthcoming track outside this prerelease's scope; first bundle shipping rebuilt agents
  # will populate this field).

# Per-file metadata for templates shipped in this bundle.
# Operator-project-side paths (foundation/<file>) per the canonical § 8.1 schema example.
# Values aligned with the canonical contract at wizard/foundation-bundles/v0/contracts/foundation-manifest-hash-baseline-v1.json
# (single authority for operator drift/merge behavior).
managed_files:
  foundation/vision.md:
    managed_by: shared
    local_modifications: expected
    merge_strategy: three_way
  foundation/prd.md:
    managed_by: operator           # operator authors content from schema (source: schema_only at v0.2)
    local_modifications: expected
    merge_strategy: operator_review
  foundation/approach.md:
    managed_by: shared
    local_modifications: allowed
    merge_strategy: three_way
  foundation/execution_plan.md:
    managed_by: operator
    local_modifications: expected
    merge_strategy: operator_review
  foundation/technical_architecture.md:
    managed_by: shared
    local_modifications: allowed
    merge_strategy: three_way
  foundation/test_cases.md:
    managed_by: operator
    local_modifications: expected
    merge_strategy: operator_review
  foundation/audit_framework.md:
    managed_by: wizard             # wizard-owned; operator changes break wizard expectations
    local_modifications: not_recommended
    merge_strategy: warn_on_drift

# Public API surface declared by this bundle.
# Per § 1.1 of the canonical foundation-versioning specification: foundation_bundle public
# API includes required filenames + frontmatter schema + sections per doc-type + agent
# contract points + migration manifest schema + managed-file boundaries.
public_api:
  required_files:
    - foundation/vision.md
    - foundation/prd.md            # NOT in included_templates (source: schema_only); operator authors
    - foundation/approach.md
    - foundation/execution_plan.md
    - foundation/technical_architecture.md
    - foundation/test_cases.md
    - foundation/audit_framework.md
  required_frontmatter_fields_per_file: see the canonical foundation-versioning specification § 1.1
  required_sections_per_doc_type: see schemas/section-schema.yaml in this bundle
  section_schema: schemas/section-schema.yaml  # path relative to this bundle directory
