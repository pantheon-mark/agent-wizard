# Migration manifest for foundation bundle v0.6.5
#
# v0.6.5 is an operating-layer update-advice fix over v0.6.4 (patch-behavioral). Two existing
# operating-layer files change; no new sections in the managed schema, no new managed files,
# foundation docs byte-identical to v0.6.4:
#   - templates/root/CLAUDE.md — the "see what's new" instruction no longer routes the operator
#     through a vague upgrade walkthrough that could read as discouraging an update. It now runs
#     `wizard upgrade-check` and REPORTS what it computes (the change summary, the system's own
#     recommendation, the exact apply command). It must never invent its own recommendation, never
#     discourage a safe (recommend_apply) update, and never treat a normal prerelease label or
#     missing notes as a reason to hold off.
#   - templates/wizard/skills/check-for-updates.md — the check-for-updates skill surfaces the same
#     system-computed recommendation and one-line "what's new" in plain words, states the two
#     never-hold-off cases (prerelease label, missing notes), and routes a behind update tool
#     (TOOLKIT_BEHIND) straight to the one-step refresh-and-apply rather than treating it as an
#     error or a reason to wait.

schema_version: v1
target_version: v0.6.5
release_date: 2026-06-24
release_classification: patch_behavioral_prerelease

# Per-artifact plain-language benefit notes used by `wizard upgrade-plan` to explain
# what each changed file does for the operator. Optional; absent entries use a default.
artifact_notes:
  CLAUDE.md:
    benefit: "Stops your system from talking you out of safe updates. When you ask \"what's new?\", it now runs the update check and reports exactly what the check found — a plain-language summary, the system's own recommendation, and the one command to apply it — instead of a vague walkthrough. It will never invent its own opinion, never discourage a verified safe update, and never treat a normal prerelease label or missing notes as a reason to wait."
  wizard/skills/check-for-updates.md:
    benefit: "Makes the start-of-session update check report the system's recommendation and a one-line \"what's new\" in plain words, so \"what's new?\" always has an answer. A normal prerelease label or missing notes is never treated as a reason to hold off, and if your update tool is behind it routes you straight to the one-step refresh-and-apply instead of stalling."

migrations:
  - from: v0.6.4
    class: patch-behavioral
    breaking_changes_summary: ""
    notes: |
      Operating-layer update-advice fix from v0.6.4: the 'see what's new' instruction in CLAUDE.md
      no longer routes through a vague upgrade walkthrough that could read as discouraging an update;
      it now runs `wizard upgrade-check` and REPORTS what it computes (change summary, the system's
      own recommendation, the exact apply command) and must never invent its own recommendation,
      never discourage a safe (recommend_apply) update, and never treat a normal prerelease label or
      missing notes as a reason to hold off. The check-for-updates skill surfaces the same
      recommendation and one-line 'what's new', states the two never-hold-off cases, and routes a
      behind update tool (TOOLKIT_BEHIND) straight to the one-step refresh-and-apply. No new managed
      files, no new capabilities; foundation docs and schema byte-identical to v0.6.4.
    migration_steps: |
      1. Run the upgrade check (plan-only) to confirm v0.6.4 -> v0.6.5 is offered.
      2. Run the apply path (operator-explicit). The corrected update-advice guidance and the
         updated check-for-updates skill are delivered; your edits to operating-layer files are
         kept or saved for review.
    preflight: |
      Verify the operator project carries a .wizard/replay-capsule.json and a
      .wizard/manifest.json whose foundation_bundle_version is v0.6.4.
    rollback: |
      Restore from .wizard/backups/pre-v0.6.5/ and set foundation_bundle_version
      back to v0.6.4.
    requires_operator_approval: true
    stop_condition: not_applicable
    supported: true
  - from: v0.6.3
    class: patch-behavioral
    breaking_changes_summary: ""
    notes: |
      Combined jump from v0.6.3 straight to v0.6.5 (an operator on v0.6.3 who never took v0.6.4).
      Delivers the v0.6.4 receipt-gate classification fix and the auto-mode explanatory note PLUS
      the v0.6.5 update-advice fix (the 'see what's new' instruction reports the system-computed
      recommendation and never dissuades safe updates; the check-for-updates skill surfaces the
      recommendation and one-line 'what's new' and routes a behind update tool to the one-step
      refresh-and-apply). All operating-layer content changes to existing files; no new sections or
      capabilities; foundation docs byte-identical to v0.6.3.
    migration_steps: |
      1. Run the upgrade check (plan-only) to confirm v0.6.3 -> v0.6.5 is offered.
      2. Run the apply path (operator-explicit). The v0.6.4 receipt-gate fix PLUS the corrected
