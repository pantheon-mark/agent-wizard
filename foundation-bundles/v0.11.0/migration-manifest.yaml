# Migration manifest for foundation bundle v0.11.0
# Minor-additive release over v0.10.2: generalizes the external-write gate beyond the field adapter
# (versioned Operation/EffectUnit model, adapter registry with per-operation-kind cardinality caps,
# credential isolation via a read-only facade, a Gmail adapter, effects-manifest hash-binding to the
# real adapter, split sealed-kernel/adapter-profile/capability trust zones) and adds an upgrade
# impact-review + reconcile engine (safely pauses an existing mechanism that no longer follows a
# safety rule and hands it to the add-capability flow). Combined-jump entries from
# v0.10.1/v0.10.0/v0.9.0/v0.8.0/v0.7.0/v0.6.9 deliver all prior content plus this release in one
# step. JSON sidecar is authoritative.
_note: JSON sidecar for migration-manifest.yaml. The wizard runtime CLI consumes JSON; YAML is the human-facing
  companion. Both files MUST stay in sync.
artifact_notes:
  .claude/commit_hygiene.sh: An always-on guard that keeps a clean baseline before building and commits
    each accepted phase as its own revertable unit.
  agents/lib/external_write/acceptance_ceremony.py: The sole deterministic writer that flips a built capability's
    descriptor from not-accepted to accepted, once the operator has approved it.
  agents/lib/external_write/adapter_registry.py: Registers each write-back operation kind with its adapter
    and enforces a per-operation-kind cardinality cap before any write happens.
  agents/lib/external_write/adapters.py: Now guarantees a dry_run preview never reaches the external write,
    the read-back, or verification — it can only report what a real write would have done.
  agents/lib/external_write/adapters_gmail.py: New Gmail adapter — label and filter actions only, never
    sending or permanently deleting anything — plugging into the same gated write path as every other
    capability.
  agents/lib/external_write/capability_api.py: New — the only import surface your capability code should
    use to write back or read from a connected account, so capability code never has a path to the credential-holding
    adapter itself.
  agents/lib/external_write/capability_registration.py: Registers an operator-originated capability (one
    the operator asks for mid-run) into the descriptor set with its risk class and protections.
  agents/lib/external_write/contracts.py: Extended with the Gmail operation kinds and their risk classes.
  agents/lib/external_write/coverage_gate.py: 'Build-time gate: checks that every declared write-back
    capability has a matching risk descriptor before a phase can be built (declaration coverage, not acceptance).'
  agents/lib/external_write/effects_manifest.py: Binds a capability's approved risk profile to the exact
    adapter code that will run it, so approving one adapter can never silently cover a different one.
  agents/lib/external_write/operations.py: Generalized so any registered adapter's write goes through
    the same plan/apply/undo/verify path as the original field-update capability, with the same dry-run
    and cardinality-cap protections.
  agents/lib/external_write/operator_acceptance.py: The path by which the operator acts on an acceptance
    — recording their decision so the acceptance ceremony can proceed.
  agents/lib/external_write/read_facade.py: Gives a capability a read-only view of a connected account,
    so the code that builds and tests a capability can never reach the credential that can write.
  agents/lib/external_write/read_facades_gmail.py: New — the read-only Gmail view your capability code
    sees, kept in its own file with no adapter or credential in it, so nothing in it can ever be repurposed
    to write.
  agents/lib/external_write/scan.py: Extended to check credential handling as well as write-path bypasses,
    and to apply the new trust-zone split so only adapter code (never capability code) is allowed to construct
    a write credential.
  agents/lib/external_write/write_gate.py: 'Runtime gate: now recognizes two safe test-target classes
    ahead of a live write — a capped, undo-proven live-sample test and a no-mutation dry-run preview —
    enforced by live blast radius, not by the word "test".'
  agents/lib/external_write/zones.py: Defines the three trust zones — the code your system trusts by default,
    the code a connected service's adapter runs, and the code a specific capability runs — that the build-time
    and upgrade checks use to tell safe adapter code from capability code that must stay read-only.
  docs/document_impact_map.md: Records the operator-originated-capability registration as a document-impacting
    event.
  operating_discipline.md: Updated so off-plan requests are routed into the enhancement flow, and update
    notices are carved out of the single-next-step rule. Also updated so a saved next step — including
    a paused or half-finished task — always leads at the start of a session or after a pause, and so saved
    state records only the version currently deployed, never a forward-looking prediction about a future
    update check.
  project_instructions.md: Updated to describe the enhancement flow and its voice rules for handling off-plan
    requests.
  quality/capability_descriptor_registry.md: A readable view of the capability descriptor set for quality
    review. Operator-reviewed on upgrade.
  quality/co-protected-workflows.md: Now lists the workflows tied to each registered capability so co-protected
    steps are visible. Operator-reviewed on upgrade.
  requirements.txt: New — pins the Python dependencies your writes-back system actually needs. Only present
    for a system that writes back to something outside itself; a read-only system has no Python dependency
    and gets no requirements.txt.
  security/capability_descriptors.json: New machine-readable record of every write-back capability your
    system has, its risk class, and whether you have accepted it. Operator-reviewed on upgrade (never
    overwritten).
  session_bootstrap.md: Now leads with the saved next step — including a paused or half-finished task
    — instead of an unrelated item picked from a date list.
  wizard/skills/add-capability.md: Now also checks for a mechanism an update safely paused because it
    no longer followed a current safety rule, and offers to bring it back through this same define-build-accept
    flow.
  wizard/skills/next-phase.md: Off-plan next-phase requests are now routed into the add-capability enhancement
    flow.
migrations:
- breaking_changes_summary: ''
  class: minor_additive
  from: v0.10.2
  migration_steps: 1. Run the update check (it reports what's new + the recommendation). 2. On the operator's
    yes, the assistant applies it ("${WIZARD_HOME:-$HOME/agent-wizard}/scripts/wizard" self-upgrade --to
    v0.11.0 --apply). 3. A backup is taken first; the operator's own data, rules, credentials, and logs
    are never touched.
  notes: 'Minor-additive release to v0.11.0: delivers the external-write gate generalization (a versioned
    Operation/EffectUnit model, an adapter registry with per-operation-kind cardinality caps, credential
    isolation via a read-only facade, a Gmail adapter, effects-manifest hash-binding to the real adapter,
    and split sealed-kernel/adapter-profile/capability trust zones) and the upgrade impact-review + reconcile
    engine (detects an existing operator mechanism that no longer follows a safety rule and safely pauses
    it, reversibly, handing it to the same define-build-accept flow used to add a new capability). No
    breaking changes; all existing field-op capabilities are byte-for-byte unaffected and all prior operator
    project files remain valid.'
  preflight: Verify the operator project carries a .wizard/manifest.json whose foundation_bundle_version
    is v0.10.2 (or any version in the supported range). A backup is taken automatically.
  requires_operator_approval: true
  rollback: Restore from .wizard/backups/pre-v0.11.0/ and set foundation_bundle_version back to v0.10.2.
  stop_condition: not_applicable
  supported: true
