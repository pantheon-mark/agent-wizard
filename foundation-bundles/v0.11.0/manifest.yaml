# Foundation bundle v0.11.0 manifest
# Minor-additive release over v0.10.2: generalizes the external-write gate beyond the field
# adapter (a versioned Operation/EffectUnit model, an adapter registry with per-op_kind
# cardinality caps, credential isolation via ReadFacade, a Gmail verb-shaped adapter,
# effects-manifest hash-binding to the real adapter, and split sealed-kernel/adapter-profile/
# capability trust zones) and adds an upgrade impact-review + reconcile engine (detects an
# operator mechanism that no longer follows a safety rule, safe-pauses it reversibly, and
# hands it to the add-capability flow instead of breaking or silently leaving it ungated).
# Changed files: agents/lib/external_write/*.py (five new modules: adapter_registry.py,
# adapters_gmail.py, effects_manifest.py, read_facade.py, zones.py; ten existing modules
# extended), wizard/skills/add-capability.md, templates/root/{operating_discipline.md,
# project_instructions.md,manual.md}, templates/scripts/{agent_invocation_template.sh,
# start_session_template.sh}, and a new templates/root/requirements_template (conditional,
# writes-back only). No breaking changes; all existing field-op capabilities are byte-for-byte
# unaffected and previously released bundles still replay. Foundation docs byte-identical to
# v0.10.2 (schema unchanged, v0.3). JSON sidecar (manifest.json) is what the engine consumes.

_note: JSON sidecar for manifest.yaml. The wizard runtime CLI consumes JSON; YAML is the human-facing
  companion. Both files MUST stay in sync.
