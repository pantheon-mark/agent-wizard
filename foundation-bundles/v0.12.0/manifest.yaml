# Foundation bundle v0.12.0 manifest
# Minor-additive release over v0.11.0: adds the RunEnvelope bulk-write trust core in the
# emitted external_write lib (agents/lib/external_write/): four new modules (evidence.py,
# run_envelope.py, bounds.py, consent_narration.py) and six existing modules extended
# (adapters.py, adapters_gmail.py, adapter_registry.py, operations.py, write_gate.py,
# copy_run_proof.py). A run-level safety envelope threads one persistent ledger through a
# whole bulk run, enforces an overall run ceiling (scaled to reversibility) on top of the
# per-op cap, applies exactly the reviewed set (refuses on plan drift), earns 'verified'
# against the real account at proof time and run time, and derives the consent sentence
# from the actual run facts. No breaking changes; all existing capabilities are byte-for-
# byte unaffected and previously released bundles still replay. Foundation docs byte-
# identical to v0.11.0 (schema unchanged, v0.3). JSON sidecar (manifest.json) is what the
# engine consumes.
_note: JSON sidecar for manifest.yaml. The wizard runtime CLI consumes JSON; YAML is the human-facing
  companion. Both files MUST stay in sync.
