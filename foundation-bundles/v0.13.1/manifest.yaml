# Foundation bundle v0.13.1 manifest
# Patch release over v0.13.0 (F-55/F-56/F-57 reconcile + operability fixes): the upgrade
# reconcile now also scopes agents/capabilities/ so a retired-surface capability whose imports
# are broken is paused as import-broken rather than left as merely "paused" (F-55); a new
# composite, read-only capability health-check primitive (agents/lib/external_write/
# capability_health.py) lets a session-start orientation check catch an import-broken
# capability before inviting the operator into it; the runtime write_gate.py deny-branch for a
# paused capability is corrected; and the update-notice prose (templates/root/CLAUDE.md) now
# separates the informational "see what's new" read from the separate, explicit approval an
# apply requires, and templates/root/operating_discipline.md's orientation-health rule wires the
# new health-check into session start. No breaking changes; all existing capabilities are
# byte-for-byte unaffected and previously released bundles still replay. Foundation docs
# byte-identical to v0.13.0 (schema unchanged, v0.3). JSON sidecar (manifest.json) is what the
# engine consumes.
_note: JSON sidecar for manifest.yaml. The wizard runtime CLI consumes JSON; YAML is the human-facing
  companion. Both files MUST stay in sync.
agent_contract_version: v0-pre-rebuild
