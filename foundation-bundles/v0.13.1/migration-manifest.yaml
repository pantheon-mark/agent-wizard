# Migration manifest for foundation bundle v0.13.1
# Patch release over v0.13.0 (F-55/F-56/F-57 reconcile + operability fixes): the upgrade
# reconcile now also scopes agents/capabilities/ so a retired-surface capability whose imports
# are broken is paused as import-broken rather than left as merely "paused"; a new composite,
# read-only capability health-check primitive (capability_health.py) lets a session-start
# orientation check catch an import-broken capability before inviting the operator into it;
# the write_gate.py runtime deny-branch for a paused capability is corrected; and the
# update-notice prose (CLAUDE.md) now separates the informational "see what's new" read from
# the separate, explicit approval an apply requires. Combined-jump entries from
# v0.12.0/v0.11.0/v0.10.2/v0.10.1/v0.10.0/v0.9.0/v0.8.0/v0.7.0/v0.6.9 deliver all prior content
# plus this release in one step. JSON sidecar is authoritative.
_note: JSON sidecar for migration-manifest.yaml. The wizard runtime CLI consumes JSON; YAML is the human-facing
  companion. Both files MUST stay in sync.
artifact_notes:
  .claude/commit_hygiene.sh: An always-on guard that keeps a clean baseline before building and commits each accepted
    phase as its own revertable unit.
  CLAUDE.md: New — the update-notice prose now separates the informational "see what's new" read (authorizes only
    the check; always returns the operator to the choice, never carries forward as permission) from the separate,
    explicit approval that naming applying requires, so the two are never conflated into one implicit yes.
  agents/cron/cron_config.md: 'New "Standing automation runners (unattended jobs)" section: documents that every
    standing-automation runner must delegate its entire argv handling to standing_automation.py''s run_standing_automation
    rather than parsing its own flags, and why (a real hand-rolled runner once silently ignored an unrecognized
    flag and ran a live job anyway).'
  agents/lib/external_write/acceptance_ceremony.py: The sole deterministic writer that flips a built capability's
    descriptor from not-accepted to accepted, once the operator has approved it.
  agents/lib/external_write/adapter_registry.py: 'Extended with an OPTIONAL grant_preflight(self, token_info) hook
    an adapter may define: a safe, read-only, offline introspection of an already-obtained OAuth token-introspection
    response, answering only "does the current token already carry the op_kind''s declared read-only scope" — never
    a write, and never an operation this method itself performs.'
  agents/lib/external_write/adapters.py: Extended to wire the offline scope grant-check into the adapter dispatch
    path (check_scope_grant / GRANT_STATUS_NOT_GRANTED), so a declared OAuth scope can be checked against a token-introspection
    response before any live use is attempted.
  agents/lib/external_write/adapters_gmail.py: All four Gmail op_kinds now declare and check the same read-only
    scope (gmail.readonly) through the new grant_preflight hook, so a missing or too-narrow Gmail scope is caught
    offline instead of surfacing as a live-run failure.
  agents/lib/external_write/bounds.py: New — the overall ceiling on how much a single run may change at once, scaled
    to how reversible the action is.
  agents/lib/external_write/capability_api.py: New — the only import surface your capability code should use to
    write back or read from a connected account, so capability code never has a path to the credential-holding adapter
    itself.
  agents/lib/external_write/capability_health.py: 'New — the composite, AST-first, read-only capability health-check
    primitive: for each capability, checks whether its source is scanner-clean, whether its module still imports
    cleanly, and whether it is paused or has a migration request queued, so a capability that fails any one of those
    checks is reported unhealthy — not merely "paused" — before the operator is ever invited into it. Performs no
    external write of any kind.'
  agents/lib/external_write/capability_registration.py: Registers an operator-originated capability (one the operator
    asks for mid-run) into the descriptor set with its risk class and protections.
  agents/lib/external_write/consent_narration.py: New — builds the consent sentence you approve from the actual
    facts of what the run will do, and keeps the plain-language narration matched to what the mechanism actually
    enforces.
  agents/lib/external_write/contracts.py: Extended with the Gmail operation kinds and their risk classes.
  agents/lib/external_write/copy_run_proof.py: The pre-acceptance copy-run proof now checks the capability's evidence
    against the real external surface (proof time), so a capability cannot be proven by code that merely ran without
    confirming the effect landed.
  agents/lib/external_write/coverage_gate.py: 'Build-time gate: checks that every declared write-back capability
    has a matching risk descriptor before a phase can be built (declaration coverage, not acceptance).'
  agents/lib/external_write/effects_manifest.py: Binds a capability's approved risk profile to the exact adapter
    code that will run it, so approving one adapter can never silently cover a different one.
  agents/lib/external_write/evidence.py: 'New — defines the per-operation-kind proof an adapter must return: what
    counts as evidence, checked against the real account, that a write actually landed and that an undo actually
    restored.'
  agents/lib/external_write/operations.py: Generalized run path now threads the real-account verification result
    through to the run envelope, so a bulk run records not just what was written but whether each write was confirmed
    against the account.
  agents/lib/external_write/operator_acceptance.py: Now imports registered_adapters.py at the top of the module
    (Task 7 / F-37), which fires every adapter module's registration before the CLI's own logic runs — the fix that
    makes the documented operator-acceptance command turnkey for a freshly-declared capability, not just for already-import-triggered
    ones.
  agents/lib/external_write/read_facade.py: Gives a capability a read-only view of a connected account, so the code
    that builds and tests a capability can never reach the credential that can write.
  agents/lib/external_write/read_facades_gmail.py: New — the read-only Gmail view your capability code sees, kept
    in its own file with no adapter or credential in it, so nothing in it can ever be repurposed to write.
  agents/lib/external_write/registered_adapters.py: 'New — the build-emitted static adapter registry that the operator-acceptance
    CLI imports at module scope, so importing one module fires every shipped AND capability-added adapter module''s
    registration once, up front. Fixes a real gap: without this, the prescribed turnkey acceptance command refused
    every freshly-declared capability with "no registered contract for op_kind ..." because nothing had imported
    its adapter module yet in that fresh process.'
  agents/lib/external_write/run_envelope.py: 'mint_run_envelope now accepts a versioned reviewed_set: the v1 shape
    (any non-empty list of mappings) is unchanged and still the default, and a new v2 shape — the one triage.py''s
    judgment-path tool produces — additionally requires a unique unit_id, a reason_shown, and stronger per-entry
    guarantees the operator''s review actually depended on, so a triage-produced reviewed_set is bound to what the
    operator was actually shown.'
  agents/lib/external_write/scan.py: Extended to check credential handling as well as write-path bypasses, and to
    apply the new trust-zone split so only adapter code (never capability code) is allowed to construct a write
    credential.
  agents/lib/external_write/standing_automation.py: 'New — the safe standing-automation entrypoint. A recurring
    or unattended job (a filter sweep, a recurring digest email, ...) must delegate its ENTIRE command-line decision
    to run_standing_automation here rather than parsing its own flags: an unrecognized flag now exits non-zero and
    touches nothing external, and a first-class --check/--dry-run preview lets a schedule or the operator confirm
    a job is safe to run without ever running it live. Closes a real dogfood incident where a hand-rolled runner
    silently ignored an unrecognized --checkonly probe and sent a real, unapproved, off-schedule email.'
  agents/lib/external_write/triage.py: 'New — the read-only judgment-path triage tool: groups write-back candidates,
    classifies each into a small generic vocabulary (safe / suspect / protected), and itemizes exceptions, producing
    exactly the reviewed_set-v2 shape run_envelope.py''s mint_run_envelope expects. Performs no external write of
    any kind — no adapter import, no run_operation reference, no credential — it only classifies data the caller
    already collected.'
  agents/lib/external_write/write_gate.py: Runtime gate now backs the run envelope with one persistent, atomic invocation
    ledger and reserves against the cap before the first write, so a run's total blast radius is bounded even across
    many actions. Extended so a paused capability's op_kind is a fail-closed deny on every sanctioned route — not
    just the ones checked incidentally — so a capability an update has paused can never be run around. Still recognizes
    the capped live-sample and no-mutation dry-run test targets by live blast radius, not by the word "test".
  agents/lib/external_write/zones.py: Extended with trust-zone exemptions for the two new build-emitted primitives
    (registered_adapters.py, standing_automation.py), documenting exactly why each is allowed to do what it does
    (module-scope adapter import; a legitimate dry_run-target run_operation call) without being mistaken for a capability-zone
    violation.
  docs/document_impact_map.md: Records the operator-originated-capability registration as a document-impacting event.
  operating_discipline.md: 'Updated so off-plan requests are routed into the enhancement flow, and update notices
    are carved out of the single-next-step rule. Also updated so a saved next step — including a paused or half-finished
    task — always leads at the start of a session or after a pause, and so saved state records only the version
    currently deployed, never a forward-looking prediction about a future update check. New: session-start orientation
    now consults the capability health-check before surfacing or resuming a capability, and refuses to invite the
    operator into one the check reports import-broken.'
  project_instructions.md: Updated to describe the enhancement flow and its voice rules for handling off-plan requests.
  quality/capability_descriptor_registry.md: A readable view of the capability descriptor set for quality review.
    Operator-reviewed on upgrade.
  quality/co-protected-workflows.md: Now lists the workflows tied to each registered capability so co-protected
    steps are visible. Operator-reviewed on upgrade.
  requirements.txt: New — pins the Python dependencies your writes-back system actually needs. Only present for
    a system that writes back to something outside itself; a read-only system has no Python dependency and gets
    no requirements.txt.
  security/capability_descriptors.json: New machine-readable record of every write-back capability your system has,
    its risk class, and whether you have accepted it. Operator-reviewed on upgrade (never overwritten).
  security/credentials_registry.md: 'Adds three OAuth-only columns — Declared scope, Needs admin grant, and Scope
    status — that separate whether a credential''s VALUE is stored (Active) from whether its specific declared scope
    has actually been checked and proven to work (deny-by-default: verified only after a real, recorded use of exactly
    that scope has succeeded). Fixes a real incident where a credential was recorded as working from a check against
    a broader scope than the one actually used.'
  session_bootstrap.md: Now leads with the saved next step — including a paused or half-finished task — instead
    of an unrelated item picked from a date list.
  wizard/skills/add-capability.md: Now also checks for a mechanism an update safely paused because it no longer
    followed a current safety rule, and offers to bring it back through this same define-build-accept flow.
  wizard/skills/credential-setup.md: Adds a new Step 0 (org-admin grant first, for an OAuth credential whose Needs
    admin grant is Yes — handled before anything else for that credential, never discovered mid-trial) and rewrites
    Step 4 (Verify) to run the offline scope grant-check first for any credential with a declared scope, before
    ever calling anything live.
  wizard/skills/next-phase.md: 'Adds a live-trial-readiness gate in Step 3: for each credential a phase''s agents
    actually use with a declared OAuth scope, checks Scope status before the phase''s supervised live trial — a
    not-yet-granted scope withholds only the trial and downstream live authorization (never the build itself, never
    Steps 1–4), and files a stub_tracker entry with the exact re-check command.'
  wizard/skills/triage-review.md: New — the operator-facing skill that runs the read-only judgment-path triage tool
    (triage.py) over a set of write-back candidates, shows the operator the grouped/classified result and any itemized
    exceptions, and on approval produces the reviewed_set-v2 that mint_run_envelope binds the run to — so what the
    operator approves is exactly and only what the run does.
  work/stub_tracker.md: The Credential stub type now also covers a declared OAuth scope that is not yet granted
    (not just a key not yet obtained or an OAuth flow not yet configured), pointing at the credentials registry's
    Scope status column and the Credential Setup skill.
migrations:
- breaking_changes_summary: ''
  class: patch
  from: v0.13.0
  migration_steps: 1. Run the update check (it reports what's new + the recommendation). 2. On the operator's yes,
    the assistant applies it ("${{WIZARD_HOME:-$HOME/agent-wizard}}/scripts/wizard" self-upgrade --to v0.13.1 --apply).
    3. A backup is taken first; the operator's own data, rules, credentials, and logs are never touched.
  notes: 'Patch release to v0.13.1 (F-55/F-56/F-57 reconcile + operability fixes): the upgrade reconcile now also
    scopes agents/capabilities/ so a retired-surface capability whose imports are broken is paused as import-broken
    rather than left merely "paused"; a new composite, read-only capability health-check primitive (capability_health.py)
    lets a session-start orientation check catch an import-broken capability before inviting the operator into it;
    the write_gate runtime now fails closed on a paused capability''s op_kind on every sanctioned route; and the
    update-notice prose now separates the informational "see what''s new" read from the separate, explicit approval
    an apply requires. No breaking changes; all existing capabilities are byte-for-byte unaffected and all prior
    operator project files remain valid.'
  preflight: Verify the operator project carries a .wizard/manifest.json whose foundation_bundle_version is v0.13.0
