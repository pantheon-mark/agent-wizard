# Migration manifest for foundation bundle v0.15.0
# Minor-additive release over v0.14.0 (Cut 1.1 — post-release Phase 4 review findings
# F-70 through F-85, five improvement areas): a sanctioned, resumable way to run a
# large batch of writes as one approved run (run_envelope.py's run_sanctioned_bulk,
# exposed via capability_api.py, used by triage-review.md) that resumes safely from
# where it left off on exactly one recorded approval; a hermetic test fixture
# (lifecycle_test_fixtures.py) plus two new build-time self-checks
# (capability_invariants.py) proving a capability's tests would catch a real mistake
# and do not depend on unrelated leftover state; a naming-collision check between a
# described-but-not-built capability and an already-built one
# (capability_identity.py/capability_registration.py), and closing out a pending
# update task when an approval completes (operator_acceptance.py); a short allowed
# list of routine read-only commands (command_manifest.py) backed by a PreToolUse
# auto-approve guard (auto_approve_gate.sh) and a read-only bulk-run status command
# (bulk_verify.py); and a privacy-safe, committable bulk-run summary
# (audit_projection.py) plus an honest, typed-result-only outcome narration
# (run_narration.py). Also adds the rebuild-paused-capability.md skill and updates
# orchestrator_prompt.md, next-phase.md, add-capability.md, manual.md,
# operating_discipline.md, commit_hygiene.sh, and gitignore_manifest.md. Combined-jump
# entries from v0.13.1/v0.13.0/v0.12.0/v0.11.0/v0.10.2/v0.10.1/v0.10.0/v0.9.0/v0.8.0/
# v0.7.0/v0.6.9 deliver all prior content plus this release in one step. JSON sidecar
# is authoritative.
_note: JSON sidecar for migration-manifest.yaml. The wizard runtime CLI consumes JSON; YAML is the human-facing
  companion. Both files MUST stay in sync.
artifact_notes:
  agents/lib/external_write/audit_projection.py: 'New — builds a redacted, committable summary of a bulk
    run: what it wrote, how many pieces, and that you approved it — with zero raw personal data in it,
    so a durable proof of what happened can be safely saved to your project''s history.'
  agents/lib/external_write/bulk_verify.py: New — a read-only status command you can run any time to see
    a bulk run's reconciled totals and what is recoverable, with a best-effort live check against the
    real account when your system can build one; it never changes anything.
  agents/lib/external_write/capability_api.py: Now also exposes the sanctioned resumable-bulk-run entry
    point, so capability code that needs to write many things at once has a safe, approved way to do it
    without reaching around the credential-holding adapter.
  agents/lib/external_write/capability_health.py: The composite capability health-check now also cleans
    up a leftover internal pause marker on an approved capability and confirms none is left behind, so
    an approved capability's health record stays accurate.
  agents/lib/external_write/capability_identity.py: Underlies the new naming-collision check between a
    capability you have only described and one you have actually built, so the two are never confused
    with each other.
  agents/lib/external_write/capability_invariants.py: Adds a check that a capability's own tests would
    actually catch a real mistake (not just that they run without error) and a check that a capability's
    own test setup no longer depends on leftover state from an unrelated earlier run — both run automatically
    before a capability's first live trial.
  agents/lib/external_write/capability_registration.py: Registering a capability now refuses a naming
    collision between one you have only described and one you have actually built, reporting it plainly
    instead of letting it pass silently.
  agents/lib/external_write/command_manifest.py: New — the single list of which read-only checks are safe
    to run without asking your permission every time, and which commands always require your explicit
    yes because they can write somewhere.
  agents/lib/external_write/copy_run_proof.py: Now also checks a stricter set of write-back predicates
    and handles a not-yet-implemented check honestly (it fails the proof rather than passing a stub),
    so a capability under construction cannot be approved on an unproven promise.
  agents/lib/external_write/evidence.py: Declares the single shared list of proof requirements a write-back
    capability must satisfy, read by both the build-time check and the pre-approval proof, so the two
    can never quietly drift apart.
  agents/lib/external_write/lifecycle_test_fixtures.py: New — lets a capability's own test set up and
    tear down its own paused/not-paused state cleanly, instead of accidentally depending on whatever state
    your real project happened to be in when the test ran.
  agents/lib/external_write/operator_acceptance.py: Approving a capability now also finishes any pending
    update-related task tied to that approval, instead of leaving that task stranded for you to notice
    later.
  agents/lib/external_write/registered_adapters.py: Small internal fix so a capability you added yourself
    keeps its own registration correctly separated from what your system shipped with, across an upgrade.
  agents/lib/external_write/run_envelope.py: 'Adds a sanctioned way to run a large batch of writes as
    a single, resumable run: you approve it once, at the moment you approve it, and if it is interrupted
    it picks back up from exactly where it left off — it can never restart from the beginning or silently
    re-ask for the same approval.'
  agents/lib/external_write/run_narration.py: New — the one place a bulk run's outcome gets put into words
    for you, built strictly from what the run's own record says happened, so a run that only partly finished
    — or was refused — can never be described to you as fully done.
  agents/lib/external_write/write_gate.py: The runtime write gate now also backs the new resumable-bulk-run
    primitive, and its refusal message for a paused capability is clearer about why the write did not
    happen.
  agents/lib/external_write/zones.py: Extends the internal trust boundaries so the new checks and the
    resumable-bulk-run primitive are recognized as legitimate parts of the system rather than mistaken
    for a rule violation.
  agents/orchestrator_prompt.md: 'Adds a session-close check: before recording today''s session log entry,
    the assistant now verifies it against what actually happened on disk and in git history, and if the
    two disagree, it stops, tells you plainly, and asks how you want to reconcile it — it never silently
    rewrites or drops a session record.'
  templates/claude_config/auto_approve_gate.sh: New — the guard that checks each read-only-check request
    against the short allowed list before letting it through without asking; anything even slightly ambiguous
    is never auto-approved, only ever a plain, safe, read-only command.
  templates/claude_config/commit_hygiene.sh: The safety check that protects sensitive files now looks
    at what is actually being added or changed, not just whether a sensitive-looking path is present —
    so removing a sensitive file from tracking no longer gets incorrectly blocked. Also saves the new
    privacy-safe bulk-run summaries automatically at the end of a session.
  templates/claude_config/settings.json: A short list of routine, read-only checks (that never write anything)
    is now allowed to run without asking your permission every time; anything that writes anywhere — or
    anything not on that short list — still always asks first.
  templates/root/manual.md: Adds a plain-language explanation, the first time you open your project, of
    the one-time "Do you trust this folder?" question Claude Code will ask you — and reassures you that
    either answer keeps you protected.
  templates/root/operating_discipline.md: Documents the paused-capability rebuild flow and the session-close
    disk/git verification step alongside the existing operating rules.
  templates/security/gitignore_manifest.md: Documents the new privacy-safe, committable bulk-run summary
    as a no-decision-needed entry, so you can see why it is saved automatically without having to inspect
    your project's ignore-list yourself.
  wizard/skills/add-capability.md: Now also offers to bring back, through this same guided flow, a capability
    an earlier update safely paused because it no longer followed a current safety rule.
  wizard/skills/next-phase.md: The build-time self-check before a new capability's first live trial now
    also confirms the capability's tests would catch a real mistake and do not depend on unrelated leftover
    state.
  wizard/skills/rebuild-paused-capability.md: 'New skill — walks you through bringing a paused capability
    back: it checks what needs fixing, guides the fix, proves it again, and asks for your fresh approval
    before it runs live again.'
  wizard/skills/triage-review.md: The guided review-and-approve flow for a batch of changes now hands
    the approved batch to the new resumable-bulk-run primitive as a single run, records your approval
    at the moment you actually gave it, and explains how a run picks back up if it is interrupted.
migrations:
- breaking_changes_summary: ''
  class: minor_additive
  from: v0.14.0
  migration_steps: 1. Run the update check (it reports what's new + the recommendation). 2. On the operator's
    yes, the assistant applies it ("${{WIZARD_HOME:-$HOME/agent-wizard}}/scripts/wizard" self-upgrade
    --to v0.15.0 --apply). 3. A backup is taken first; the operator's own data, rules, credentials, and
    logs are never touched.
  notes: 'Minor-additive release to v0.15.0 (Cut 1.1: findings F-70 through F-85 from the post-release
    Phase 4 review): the Cut 1.1 slice: five sets of improvements to bulk-write reliability, capability-lifecycle
    testing, and audit trust. First, resuming an interrupted bulk run (a large batch of writes split into
    many smaller pieces) now picks up safely from exactly where it left off, using the one approval you
    already gave, recorded at the moment you gave it — it can never restart from the beginning, silently
    skip pieces, or ask you to approve the same batch twice. Second, a capability''s own tests can no
    longer accidentally depend on leftover state from an unrelated earlier run, and building a new capability
    now proves — as a standard build-time check — that its tests would actually catch a real mistake,
    not just that they run without error; approving a capability also now cleans up any leftover internal
    marker it no longer needs, and a naming collision between a capability you have only described and
    one you have actually built is reported honestly rather than showing as broken. Third, finishing an
    approval that had a related pending update task now also completes that task instead of leaving it
    stranded, and a capability an update safely paused can be brought back through the same guided review-and-approve
    flow used to build a new one. Fourth, you can now ask your system, at any time, exactly what a bulk
    run wrote, what is recoverable, and whether it can confirm each write against the real account — without
    waiting on a scheduled check — and a handful of routine, read-only checks (that never write anything)
    no longer interrupt you for permission every single time; anything that writes anywhere still always
    asks first. Fifth, a privacy-safe, committable summary of each bulk run is now saved automatically
    — with no raw personal information in it — so you always have durable proof of what happened and that
    you approved it, and a run''s outcome is now always described strictly from what actually happened,
    so it can never be rounded up to “all done” when it was not. No breaking changes; all existing capabilities
    are byte-for-byte unaffected and all prior operator project files remain valid.'
  preflight: Verify the operator project carries a .wizard/manifest.json whose foundation_bundle_version
    is v0.14.0 (or any version in the supported range). A backup is taken automatically.
  requires_operator_approval: true
  rollback: Restore from .wizard/backups/pre-v0.15.0/ and set foundation_bundle_version back to v0.14.0.
  stop_condition: not_applicable
  supported: true
