    triage tool (triage.py) bound to a versioned reviewed_set-v2 so an operator''s approval is bound to
    exactly what was shown, a safe standing-automation entrypoint that never lets a scheduled job silently
    fall through to a live run on an unrecognized flag, and an offline OAuth scope grant-check (deny-by-default:
    verified only after a real, recorded use of exactly the declared scope) surfaced through the credential
    registry, Credential Setup, and the next-phase live-trial-readiness gate) PLUS the v0.13.1 patch (the
    upgrade reconcile now also scopes agents/capabilities/ so a retired-surface capability whose imports
    are broken is paused as import-broken rather than left merely "paused"; a new composite, read-only
    capability health-check primitive (capability_health.py) lets a session-start orientation check catch
    an import-broken capability before inviting the operator into it; the write_gate runtime now fails
    closed on a paused capability''s op_kind on every sanctioned route; and the update-notice prose now
    separates the informational "see what''s new" read from the separate, explicit approval an apply requires)
    PLUS the v0.14.0 Phase 3 Cut 1 self-QA slice (a fail-closed capability-identity resolver (capability_identity.py)
    enforcing a four-way descriptor/capability/mechanism/module-stem coherence check — surface deliberately
    excluded — at registration, acceptance, and health time, so a descriptor id that resolves to a different
    capability than the one being registered is refused rather than silently trusted; an idempotent lifecycle
    reconciler (lifecycle_state.py) that keeps paused/accepted state coherent (a rebuild or migration
    forces accepted:false until the operator re-trials it, and a conformant rebuild that changed the capability''s
    own code is detected as stale and its acceptance revoked rather than carried forward silently) and
    appends to the acceptance audit log on every re-acceptance; and the D-Layer-1 deterministic capability-invariant
    battery plus test-quality probes (capability_invariants.py), run at next-phase Step 4 and fail-closed
    before any live trial. Also scrubs internal decision-record IDs out of emitted content and adds .gitignore
    coverage for the consent/runtime artifacts these mechanisms generate PLUS the Cut 1.1 slice: five
    sets of improvements to bulk-write reliability, capability-lifecycle testing, and audit trust. First,
    resuming an interrupted bulk run (a large batch of writes split into many smaller pieces) now picks
    up safely from exactly where it left off, using the one approval you already gave, recorded at the
    moment you gave it — it can never restart from the beginning, silently skip pieces, or ask you to
    approve the same batch twice. Second, a capability''s own tests can no longer accidentally depend
    on leftover state from an unrelated earlier run, and building a new capability now proves — as a standard
    build-time check — that its tests would actually catch a real mistake, not just that they run without
    error; approving a capability also now cleans up any leftover internal marker it no longer needs,
    and a naming collision between a capability you have only described and one you have actually built
    is reported honestly rather than showing as broken. Third, finishing an approval that had a related
    pending update task now also completes that task instead of leaving it stranded, and a capability
    an update safely paused can be brought back through the same guided review-and-approve flow used to
    build a new one. Fourth, you can now ask your system, at any time, exactly what a bulk run wrote,
    what is recoverable, and whether it can confirm each write against the real account — without waiting
    on a scheduled check — and a handful of routine, read-only checks (that never write anything) no longer
    interrupt you for permission every single time; anything that writes anywhere still always asks first.
    Fifth, a privacy-safe, committable summary of each bulk run is now saved automatically — with no raw
    personal information in it — so you always have durable proof of what happened and that you approved
    it, and a run''s outcome is now always described strictly from what actually happened, so it can never
    be rounded up to “all done” when it was not.) No breaking changes; all existing capabilities are byte-for-byte
    unaffected and all prior operator project files remain valid.'
  preflight: Verify the operator project carries a .wizard/manifest.json whose foundation_bundle_version
    is v0.7.0 (or any version in the supported range). A backup is taken automatically.
  requires_operator_approval: true
  rollback: Restore from .wizard/backups/pre-v0.15.0/ and set foundation_bundle_version back to v0.7.0.
  stop_condition: not_applicable
  supported: true
