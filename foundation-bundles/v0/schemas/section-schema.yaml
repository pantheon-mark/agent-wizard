# Foundation bundle v0.1 section schema
# Canonical machine-readable instance for foundation-doc-type section schemas + shape-extension metadata.
#
# Schema discipline:
# - This YAML is the canonical machine-readable instance for section schemas.
# - The canonical human-readable prose specification lives in the build-side foundation versioning
#   documentation (not distributed in this directory).
# - The build-side render-contract validator reads this YAML; it does NOT embed schema constants.
# - Drift between this YAML and the canonical prose specification is detected via
#   governance_prose_section_1_4_hash (bump explicitly when the canonical prose changes).
#
# Field semantics:
#   id: stable section ID (string; never changes across schema revisions)
#   title: operator-visible heading text (string)
#   required: section presence required for valid bundle (bool; preserves v0 semantics)
#   applies_to: [all]                                  XOR with applies_to_shapes
#   applies_to_shapes: [<shape-list>]                  XOR with applies_to; values must be in shape_vocabulary
#   render_modes: [complete | foundation_only | both]  list enum
#   operator_visible: bool (default true)
#   population_status: populated | deferred | blocked_pending_replacement (default populated)
#   undefer_trigger: prose (required when population_status != populated)
#   source: template | runtime | schema_only           # distinguishes template-backed vs runtime-generated vs forward-declared sections

section_schema_version: v0.1
