# Foundation bundle v0.14.0 manifest
# Minor-additive release over v0.13.1 (Phase 3 Cut 1 self-QA slice): adds three new modules
# to the emitted external_write lib (agents/lib/external_write/) — capability_identity.py (a
# fail-closed CapabilityIdentity resolver enforcing a 4-way build-time identity invariant, wired
# onto the enforced acceptance/health/migration path), lifecycle_state.py (an idempotent
# capability lifecycle reconciler: coherent paused state, rebuild/migration forces
# accepted:false until re-trial, conformant-rebuild staleness detection + revocation, a
# sanctioned complete_migration with fail-safe ordering, and audit-append on every
# re-acceptance), and capability_invariants.py (the D-Layer-1 deterministic capability-invariant
# battery plus test-quality probes — producer-entrypoint and known-bad-fails — run in
# next-phase Step 4, fail-closed before a live trial). Also extends acceptance_ceremony.py,
# capability_health.py, capability_registration.py, operator_acceptance.py,
# standing_automation.py, and zones.py to thread the new identity/lifecycle primitives onto
# the enforced path, and updates templates/wizard/skills/next-phase.md (D-Layer-1 Step 4
# wiring), templates/root/operating_discipline.md, templates/root/gitignore_template, and
# templates/security/gitignore_manifest.md (consent/runtime artifact coverage + UX fixes
# F-64/F-65/F-67). No breaking changes; all existing capabilities are byte-for-byte unaffected
# and previously released bundles still replay. Foundation docs byte-identical to v0.13.1
# (schema unchanged, v0.3). JSON sidecar (manifest.json) is what the engine consumes.
_note: JSON sidecar for manifest.yaml. The wizard runtime CLI consumes JSON; YAML is the human-facing
  companion. Both files MUST stay in sync.
