# Migration manifest for foundation bundle v0.6.9
# v0.6.9 makes the check-for-updates skill + CLAUDE.md always invoke the tool by full resolved
# path, so the update step never reports 'command not found'. Foundation docs byte-identical
# across the range. JSON sidecar is authoritative.
_note: JSON sidecar for migration-manifest.yaml. The wizard runtime CLI consumes JSON; YAML is the human-facing
  companion. Both files MUST stay in sync.
artifact_notes:
  CLAUDE.md: The system-update-notice rule now always runs the update commands using the tool's full resolved path
    (never a bare `wizard`), so they never report 'command not found'.
  wizard/skills/check-for-updates.md: The check and apply commands now always use the tool's full resolved path,
    so the update step never fails with 'command not found'.
migrations:
- breaking_changes_summary: ''
  class: patch-behavioral
  from: v0.6.8
  migration_steps: 1. Run the update check (it reports what's new + the recommendation). 2. On the operator's yes,
    the assistant applies it ("${WIZARD_HOME:-$HOME/agent-wizard}/scripts/wizard" self-upgrade --to v0.6.9 --apply).
    3. A backup is taken first; the operator's own data, rules, credentials, and logs are never touched.
  notes: 'Operating-layer reliability fix to v0.6.9: the system now always runs its update commands using the tool''s
    full resolved path (never a bare `wizard`), so the update step never trips over a ''command not found'' message.
    No new capabilities; foundation documents and schema are byte-identical to v0.6.8.'
  preflight: Verify the operator project carries a .wizard/manifest.json whose foundation_bundle_version is v0.6.8
    (or any version in the supported range). A backup is taken automatically.
  requires_operator_approval: true
  rollback: Restore from .wizard/backups/pre-v0.6.9/ and set foundation_bundle_version back to v0.6.8.
  stop_condition: not_applicable
  supported: true
