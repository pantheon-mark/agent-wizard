# Foundation bundle v0.13.0 manifest
# Minor-additive release over v0.12.0 (operability slice): adds turnkey acceptance-CLI,
# judgment-path triage + consent-artifact binding, safe standing-automation, an offline
# scope grant-check, and an honest safe-pause notice to the emitted external_write lib
# (agents/lib/external_write/): three new modules (registered_adapters.py, triage.py,
# standing_automation.py) plus targeted extensions to existing modules (adapter_registry.py,
# adapters.py, adapters_gmail.py, operator_acceptance.py, run_envelope.py, zones.py). Also
# ships a new operator-facing skill (wizard/skills/triage-review.md) and updates to
# credential-setup.md, next-phase.md, agents/cron_config.md, security/credentials_registry.md,
# and work/stub_tracker.md. No breaking changes; all existing capabilities are byte-for-byte
# unaffected and previously released bundles still replay. Foundation docs byte-identical to
# v0.12.0 (schema unchanged, v0.3). JSON sidecar (manifest.json) is what the engine consumes.
_note: JSON sidecar for manifest.yaml. The wizard runtime CLI consumes JSON; YAML is the human-facing
  companion. Both files MUST stay in sync.
